repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (unit tests only)
        # `uv run` finds the project's .venv and uses its pytest. Bare
        # `pytest` (or even `python -m pytest`) under language:system may
        # resolve to the system Python on PATH and miss the editable
        # install — pre-commit doesn't preserve venv activation.
        entry: uv run --no-sync pytest -m unit -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
