<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — TradingAgents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    .rating-buy  { @apply bg-green-200 text-green-900; }
    .rating-ow   { @apply bg-green-100 text-green-800; }
    .rating-hold { @apply bg-gray-200 text-gray-700; }
    .rating-uw   { @apply bg-red-100 text-red-800; }
    .rating-sell { @apply bg-red-200 text-red-900; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

  <header class="bg-gray-900 text-white px-4 py-3 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <a href="/trading/" class="font-bold text-lg">TradingAgents</a>
      <nav class="text-sm space-x-3">
        <a href="/trading/" class="hover:text-blue-300">Today</a>
        <a href="/trading/live" class="hover:text-blue-300">Live</a>
        <a href="/trading/portfolio" class="hover:text-blue-300">Portfolio</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-3xl mx-auto p-4 text-xs text-gray-500 text-center">
    <a href="/trading/api/poll" class="hover:underline">/api/poll</a> ·
    <a href="/trading/health" class="hover:underline">/health</a>
  </footer>
</body>
</html>
