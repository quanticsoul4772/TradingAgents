<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — TradingAgents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .rating-buy  { @apply bg-green-200 text-green-900; }
    .rating-ow   { @apply bg-green-100 text-green-800; }
    .rating-hold { @apply bg-gray-200 text-gray-700; }
    .rating-uw   { @apply bg-red-100 text-red-800; }
    .rating-sell { @apply bg-red-200 text-red-900; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

  <!-- top bar (FR-019 cost meter visible everywhere) -->
  <header class="bg-gray-900 text-white px-4 py-3 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div>
        <a href="/" class="font-bold text-lg">TradingAgents</a>
        <span class="text-gray-400 text-xs ml-2">paper-only</span>
      </div>
      <nav class="text-sm space-x-3">
        <a href="/" class="hover:text-blue-300">Today</a>
        <a href="/live" class="hover:text-blue-300">Live</a>
        <a href="/portfolio" class="hover:text-blue-300">Portfolio</a>
      </nav>
    </div>
  </header>

  <!-- FR-018 paper-only banner -->
  <div class="bg-yellow-50 border-b border-yellow-200 text-yellow-900 text-xs text-center py-1.5">
    Simulation only — not financial advice.
  </div>

  <main class="max-w-3xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-3xl mx-auto p-4 text-xs text-gray-500 text-center">
    <a href="/api/poll" class="hover:underline">/api/poll</a> ·
    <a href="/health" class="hover:underline">/health</a> ·
    spec 250-dashboard-ui
  </footer>
</body>
</html>
